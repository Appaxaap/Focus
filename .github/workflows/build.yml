name: Build and Release Focus APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          TAG=${GITHUB_REF_NAME}
          UNIVERSAL=build/app/outputs/flutter-apk/app-release-unsigned.apk
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            UNIVERSAL=build/app/outputs/flutter-apk/app-release.apk
          fi
          mv "${UNIVERSAL}" \
             build/app/outputs/flutter-apk/Focus-${TAG}-universal.apk
          ARM64=build/app/outputs/flutter-apk/app-arm64-v8a-release-unsigned.apk
          if [ -f "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" ]; then
            ARM64=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          fi
          mv "${ARM64}" \
             build/app/outputs/flutter-apk/Focus-${TAG}-arm64-v8a.apk
          ARMEABI=build/app/outputs/flutter-apk/app-armeabi-v7a-release-unsigned.apk
          if [ -f "build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk" ]; then
            ARMEABI=build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          fi
          mv "${ARMEABI}" \
             build/app/outputs/flutter-apk/Focus-${TAG}-armeabi-v7a.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Focus ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/Focus-${{ github.ref_name }}-universal.apk
            build/app/outputs/flutter-apk/Focus-${{ github.ref_name }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/Focus-${{ github.ref_name }}-armeabi-v7a.apk
